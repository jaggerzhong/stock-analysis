    moat_premium: 0.12

# Moat Premium Rules
# 护城河溢价规则
moat_rules:
  wide_moat_premium: 0.15
  narrow_moat_premium: 0.08
  no_moat_discount: -0.10
  
  moat_types:
    regulatory_license:
      description: "监管牌照（核能、金融等）"
      premium: 0.15
      examples: ["CEG", "EXC", "DUK", "NEE"]
      
    network_effect:
      description: "网络效应（社交、交易平台）"
      premium: 0.10
      examples: ["COIN", "PLTR", "HOOD"]
      
    technology_moat:
      description: "技术壁垒（芯片设计、AI模型）"
      premium: 0.10
      examples: ["NVDA", "AMD", "AVGO", "GOOGL"]
      
    ecosystem_lock_in:
      description: "生态系统锁定（iOS、Azure、AWS）"
      premium: 0.15
      examples: ["AAPL", "MSFT", "AMZN"]
    
    cost_advantage:
      description: "成本优势（规模效应、制造壁垒）"
      premium: 0.05
      examples: ["TSLA", "AMZN", "BABA"]
    
    brand_power:
      description: "品牌力（消费者粘性、定价权）"
      premium: 0.05
      examples: ["AAPL", "NVDA", "TSLA"]

# Growth-Value Balance
# 成长与价值的平衡
growth_value_balance:
  # 高增长股票：PE百分位权重降低，增长溢价权重提高
  high_growth:
    pe_percentile_weight: 0.30
    growth_premium_weight: 0.45
    moat_premium_weight: 0.25
    criteria: "revenue_growth > 20%"
    
  # 平衡增长：三层均衡
  balanced:
    pe_percentile_weight: 0.40
    growth_premium_weight: 0.35
    moat_premium_weight: 0.25
    criteria: "revenue_growth 10-20%"
    
  # 价值股：PE百分位为主
  value:
    pe_percentile_weight: 0.60
    growth_premium_weight: 0.15
    moat_premium_weight: 0.25
    criteria: "revenue_growth < 10%"
